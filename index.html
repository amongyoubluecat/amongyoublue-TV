<!DOCTYPE html>
<html lang="en">
    <head prefix="og: http://ogp.me/ns#">
        <meta charset="utf-8">
        <title>amongyoublue TV- Weird and funny videos!</title>
        <meta name="description" content="Channel-hop through a collection of weird and bewildering videos.">
        <meta name="author" content="Neave Interactive">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
        <meta name="referrer" content="origin">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <meta name="apple-mobile-web-app-title" content="amongyoublue TV">
        <meta name="application-name" content="amongyoublue TV">
        <meta name="msapplication-tooltip" content="amongyoublue TV">
        <meta name="msapplication-TileColor" content="#000">
        <meta name="msapplication-navbutton-color" content="#000">
        <meta name="theme-color" content="#000">
        <link rel="icon" sizes="64x64" href="assets/images/icon.png">
        <style>
            @keyframes neave-anim {
                to {
                    background-position: 0 400%
                }
            }

            @keyframes fade-anim {
                0% {
                    opacity: 0
                }

                40% {
                    opacity: 0
                }

                50% {
                    opacity: 1
                }

                60% {
                    opacity: 0
                }

                100% {
                    opacity: 0
                }
            }

            @keyframes fade-mid-anim {
                0% {
                    opacity: .5
                }

                40% {
                    opacity: .5
                }

                50% {
                    opacity: 1
                }

                60% {
                    opacity: .5
                }

                100% {
                    opacity: .5
                }
            }

            .neave {
                position: absolute;
                display: block;
                left: 15px;
                left: calc(15px + env(safe-area-inset-left));
                top: 15px;
                top: calc(15px + env(safe-area-inset-top));
                width: 44px;
                height: 44px;
                margin: 0;
                padding: 0;
                z-index: 100
            }

            .neave .title {
                display: none
            }

            .neave svg {
                position: absolute;
                left: 0;
                top: 0;
                z-index: 100;
                border-radius: 50%;
                border: 2px solid #fff;
                margin: 0;
                padding: 0;
                box-sizing: content-box;
                pointer-events: none
            }

            .mobile .neave svg {
                animation: fade-mid-anim 5s infinite ease-in-out
            }

            .neave .disc {
                position: absolute;
                display: block;
                width: 44px;
                height: 44px;
                background-color: #9fc;
                background-image: linear-gradient(to bottom,#9fc 0%,#9cf 25%,#f9c 50%,#fc9 75%,#9fc 100%);
                background-size: 100% 400%;
                border-radius: 50%;
                pointer-events: none;
                animation: neave-anim 8s infinite linear;
                opacity: 0;
                will-change: opacity;
                transition: opacity .2s ease-out
            }

            .mobile .neave .disc {
                animation: neave-anim 8s infinite linear,fade-anim 5s infinite ease-in-out
            }

            body:not(.mobile) .neave:hover .disc {
                opacity: 1
            }

            .neave:active {
                margin-top: 1px
            }
        </style>
        <link rel="stylesheet" href="assets/css/tv.css">
        <link rel="stylesheet" href="assets/css/css.css">
    </head>
    <body>
        <canvas class="tv"></canvas>
        <div class="autoplay">
            <h1>amongyoublue TV</h1>
            <p>Click to start</p>
        </div>
        <div class="scanlines"></div>
            Please upgrade your web browser!<br>
            Get <a href="https://www.google.com/chrome/" rel="nofollow" target="_top">Google &nbsp;Chrome</a>
            or <a href="https://www.mozilla.org/firefox/" rel="nofollow" target="_top">Mozilla &nbsp;Firefox</a>
            .
        </p>
        <script src="assets/js/tv.js"></script>
        <script>
            TV.playlist = [ 'baldi', 'bomb', 'broken', 'china_ai_fox', 'furby', 'guacamole', 'hand_dj', 'jacob_giraffe', 'jurrasic_horse', 'laughing', 'minecraft_nutshell', 'ring', 'sanic', 'spoon', 'sprunki', 'washing_machine', 'ww3_trailer'];
        </script>
        <audio id="beep">
            <source src="assets/audio/blip.mp3">
        </audio>
    </body>
</html>
